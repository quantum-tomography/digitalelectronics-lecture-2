      "id": "s_0mhtfnp4",
      "type": "content",
      "title": "What is a power supply?",
      "text": "\n\n  <h2 style=\"margin-top: 0; margin-bottom: 18px; font-size: 2em; color: #f8fafc;\">\n    What is a Power Supply?\n  <\/h2>\n\n  <p style=\"font-size: 1.08em; margin-bottom: 14px;\">\n    A power supply is an electrical device that provides electric power to a load. Its primary role is to convert electrical energy from a source into the correct form required by the load. ①\n  <\/p>\n\n  <p style=\"font-size: 1.08em; margin-bottom: 14px;\">\n    This conversion ensures the proper voltage, current, and frequency for safe and reliable operation. Because of this function, power supplies are often referred to as electric power converters. ②\n  <\/p>\n\n  <p style=\"font-size: 1.08em; margin-bottom: 14px;\">\n    Power supplies may exist as standalone units or be integrated directly into electronic devices. Common examples include power supplies inside computers, televisions, and other consumer electronics. ③\n  <\/p>\n\n  <p style=\"font-size: 1.08em; margin-bottom: 14px;\">\n    In addition to energy conversion, power supplies may provide protection and conditioning functions. These include limiting current, shutting down during faults, and filtering noise or voltage spikes. ④\n  <\/p>\n\n  <p style=\"font-size: 1.08em; margin-bottom: 14px;\">\n    Some power supplies also improve efficiency through power-factor correction or ensure continuity of operation. For example, uninterruptible power supplies (UPS) store energy to maintain operation during temporary power loss. ⑤\n  <\/p>\n\n  <p style=\"font-size: 1.08em; margin-bottom: 14px;\">\n    Every power supply has an input connection that receives electrical energy from a source. It also has one or more output connections that deliver power to the load. ⑥\n  <\/p>\n\n  <p style=\"font-size: 1.08em; margin-bottom: 14px;\">\n    The input energy may come from sources such as the electrical grid, batteries, generators, or renewable systems like solar panels. In most cases, power transfer occurs through wired connections. ⑦\n  <\/p>\n\n  <p style=\"font-size: 1.08em; margin-bottom: 0;\">\n    However, some systems use wireless energy transfer to supply power without direct electrical contact. Additional interfaces may also be included for monitoring, control, and system management. ⑧\n  <\/p>\n\n<\/div>",
      "bullets": [],
      "useDropcap": true
    },
    {
      "id": "s_hb9x9kgn",
      "type": "content",
      "title": "Cybersecurity of Power Supplies",
      "text": "<div style=\"max-width: 900px; margin: 0 auto; padding: 28px 32px; background: linear-gradient(135deg, #0f172a, #1e293b); color: #e2e8f0; border-radius: 18px; box-shadow: 0 10px 30px rgba(0,0,0,0.28); font-family: Arial, sans-serif; line-height: 1.7;\">\n\n  <h2 style=\"margin-top: 0; margin-bottom: 18px; font-size: 2em; color: #f8fafc;\">\n    Cybersecurity Risks in Network-Connected Power Supplies\n  <\/h2>\n\n  <p style=\"font-size: 1.08em; margin-bottom: 14px;\">\n    Modern power supplies are no longer simple energy-conversion devices but intelligent components integrated into IoT and industrial networks. They enable remote monitoring, predictive maintenance, efficiency optimization, and detailed control of power distribution. ①\n  <\/p>\n\n  <p style=\"font-size: 1.08em; margin-bottom: 14px;\">\n    This transformation significantly improves system performance and manageability. However, it also introduces a critical new dimension: every connected power module becomes a potential cybersecurity vulnerability. ②\n  <\/p>\n\n  <p style=\"font-size: 1.08em; margin-bottom: 14px;\">\n    Once network connectivity is introduced, power supplies effectively act as nodes within a larger digital infrastructure. If not properly secured, they can be exploited as entry points for attackers seeking access to internal networks. ③\n  <\/p>\n\n  <p style=\"font-size: 1.08em; margin-bottom: 14px;\">\n    A well-known real-world example is the :contentReference[oaicite:1]{index=1}, where attackers gained access through a third-party HVAC system. From there, they were able to infiltrate deeper into the company network and ultimately compromise millions of customer records. ④\n  <\/p>\n\n  <p style=\"font-size: 1.08em; margin-bottom: 14px;\">\n    This case illustrates that seemingly low-level or auxiliary systems can become critical attack vectors. In a similar way, network-connected power supplies or embedded controllers can be used as stepping stones for lateral movement within a system. ⑤\n  <\/p>\n\n  <p style=\"font-size: 1.08em; margin-bottom: 14px;\">\n    Beyond data breaches, attackers may also attempt direct manipulation of power systems. By sending malicious commands, they could alter voltage levels, disrupt current regulation, or force unsafe operating conditions. ⑥\n  <\/p>\n\n  <p style=\"font-size: 1.08em; margin-bottom: 14px;\">\n    Such actions can lead not only to system downtime but also to physical damage of equipment and safety risks. In industrial environments, this type of interference may halt production or compromise critical infrastructure. ⑦\n  <\/p>\n\n  <p style=\"font-size: 1.08em; margin-bottom: 14px;\">\n    Another concern is that connected devices often expose identifiers such as IP or MAC addresses. If these are accessible, attackers can map the system structure and identify vulnerable targets more easily. ⑧\n  <\/p>\n\n  <p style=\"font-size: 1.08em; margin-bottom: 14px;\">\n    Wireless communication can further increase exposure, especially if encryption or authentication mechanisms are weak. For this reason, wired communication is generally preferred in high-security environments whenever possible. ⑨\n  <\/p>\n\n  <p style=\"font-size: 1.08em; margin-bottom: 14px;\">\n    Cybersecurity must therefore be treated as a system-level requirement rather than an afterthought. Every component, from embedded power modules to central servers, must be evaluated for potential vulnerabilities. ⑩\n  <\/p>\n\n  <p style=\"font-size: 1.08em; margin-bottom: 0;\">\n    Effective protection includes secure design practices, continuous monitoring, regular audits, and collaboration with cybersecurity experts. Only by addressing security at every layer can modern power systems achieve both high performance and resilience against cyber threats. ⑪\n  <\/p>\n<div style=\"max-width: 900px; margin: 0 auto; padding: 28px 32px; background: linear-gradient(135deg, #0f172a, #1e293b); color: #e2e8f0; border-radius: 18px; box-shadow: 0 10px 30px rgba(0,0,0,0.28); font-family: Arial, sans-serif; line-height: 1.7; position: relative;\">\n\n  <!-- your slide content here -->\n\n  <!-- Reference Footer -->\n  <div style=\"position: absolute; bottom: 10px; left: 20px; right: 20px; font-size: 0.75em; color: #94a3b8;\">\n    Source: RECOM Power, “Power Supplies and Cybersecurity Risks: An Often-Neglected Concern,” Sep. 19, 2025. :contentReference[oaicite:2]{index=2}\n  <\/div>\n\n<\/div>\n<\/div>",
      "bullets": [],
      "useDropcap": true
    },
    {
      "id": "s_lybmk1ny",
      "type": "content",
      "title": "Cybersecurity of Power Supplies",
      "text": "<div style=\"max-width: 900px; margin: 0 auto; padding: 28px 32px; background: linear-gradient(135deg, #0f172a, #1e293b); color: #e2e8f0; border-radius: 18px; box-shadow: 0 10px 30px rgba(0,0,0,0.28); font-family: Arial, sans-serif; line-height: 1.7; position: relative;\">\n\n  <h2 style=\"margin-top: 0; margin-bottom: 18px; font-size: 2em; color: #f8fafc;\">\n    Cybersecurity in Power Grids – Core Challenges\n  <\/h2>\n\n  <p style=\"font-size: 1.08em; margin-bottom: 14px;\">\n    Modern power grids are undergoing rapid digitalization driven by renewable energy integration, distributed generation, and the need for real-time monitoring and control. This transformation requires extensive communication infrastructure, significantly increasing interconnection between previously isolated components. ①\n  <\/p>\n\n  <p style=\"font-size: 1.08em; margin-bottom: 14px;\">\n    As a result, the attack surface of the power grid expands dramatically. Cyberattacks are no longer theoretical and have already caused real large-scale blackouts, proving that power grids are vulnerable critical infrastructure. ②\n  <\/p>\n\n  <p style=\"font-size: 1.08em; margin-bottom: 14px;\">\n    A typical grid communication architecture separates the office IT network from the process control network (PCN), which connects control rooms, substations, and field devices. However, in practice, these networks are often interconnected through VPNs or maintenance channels, enabling potential lateral movement. ③\n  <\/p>\n\n  <p style=\"font-size: 1.08em; margin-bottom: 14px;\">\n    This interconnection is dangerous because compromising a simple office workstation can lead to access to critical control systems. Once inside the PCN, attackers may control programmable logic controllers and directly influence physical grid behavior. ④\n  <\/p>\n\n  <p style=\"font-size: 1.08em; margin-bottom: 14px;\">\n    In power systems, the classical cybersecurity model of confidentiality, integrity, and availability must be reinterpreted. Availability is by far the most critical requirement, because even short outages can have severe cascading consequences. ⑤\n  <\/p>\n\n  <p style=\"font-size: 1.08em; margin-bottom: 14px;\">\n    Power grids must maintain a strict balance between generation and consumption to keep frequency stable at 50 or 60 Hz. Even small disturbances can propagate and escalate into large-scale failures due to delayed control responses and cascading effects. ⑥\n  <\/p>\n\n  <p style=\"font-size: 1.08em; margin-bottom: 14px;\">\n    Attackers can exploit this sensitivity by controlling relatively small loads or generators. Through coordinated manipulation, they can trigger instability and potentially cause widespread blackouts. ⑦\n  <\/p>\n\n  <p style=\"font-size: 1.08em; margin-bottom: 14px;\">\n    The increasing decentralization of energy production, especially through renewable sources like solar panels, introduces additional vulnerabilities. Many small-scale producers lack proper security, making them attractive targets for coordinated attacks. ⑧\n  <\/p>\n\n  <p style=\"font-size: 1.08em; margin-bottom: 14px;\">\n    A major structural problem is that many industrial control protocols, such as IEC 60870-5-104 and DNP3, were designed decades ago without security mechanisms. These protocols often lack authentication, encryption, and integrity protection, making them susceptible to spoofing and denial-of-service attacks. ⑨\n  <\/p>\n\n  <p style=\"font-size: 1.08em; margin-bottom: 14px;\">\n    Additionally, power grid devices are designed for lifetimes of several decades, making rapid upgrades difficult. This leads to “insecurity by inheritance,” where outdated and insecure technologies remain in operation for long periods. ⑩\n  <\/p>\n\n  <p style=\"font-size: 1.08em; margin-bottom: 14px;\">\n    Attack vectors are diverse and include lateral movement from office networks, physical access to substations, remote maintenance interfaces, and supply-chain compromises. Even air-gapped systems can be infected through removable media such as USB drives. ⑪\n  <\/p>\n\n  <p style=\"font-size: 1.08em; margin-bottom: 14px;\">\n    Once attackers gain access, they can execute several critical attack scenarios. These include disconnecting grid components, injecting false sensor data to mislead operators, or launching denial-of-service attacks on control systems. ⑫\n  <\/p>\n\n  <p style=\"font-size: 1.08em; margin-bottom: 14px;\">\n    Because of these risks, the paper proposes a defense-in-depth strategy. Security must be applied across multiple layers, including devices, networks, physical infrastructure, and organizational processes. ⑬\n  <\/p>\n\n  <p style=\"font-size: 1.08em; margin-bottom: 40px;\">\n    This includes intrusion detection systems, network segmentation, secure firmware, physical protection of substations, and continuous staff training. Only a coordinated, system-wide approach can ensure both resilience and high availability in modern power grids. ⑭\n  <\/p>\n\n  <!-- Reference Footer -->\n  <div style=\"position: absolute; bottom: 10px; left: 20px; right: 20px; font-size: 0.75em; color: #94a3b8;\">\n    Source: T. Krause et al., “Cybersecurity in Power Grids: Challenges and Opportunities,” Sensors, vol. 21, no. 18, 2021. :contentReference[oaicite:0]{index=0}\n  <\/div>\n\n<\/div>",
      "bullets": [],
      "useDropcap": true
    },
    {
      "id": "s_e7bjbq4m",
      "type": "content",
      "title": "Cybersecurity of Power Supplies",
      "text": "  <h2>\n    Cybersecurity in the Electric Power Supply Sector\n  <\/h2>\n\n  <p style=\"font-size: 1.08em; margin-bottom: 14px;\">\n    Cybersecurity is a fundamental requirement for modern electricity generation and supply systems. Power infrastructure is considered critical, and it is increasingly targeted by sophisticated cyberattacks, including those from nation-states and organized groups. :contentReference[oaicite:0]{index=0} ①\n  <\/p>\n\n  <p style=\"font-size: 1.08em; margin-bottom: 14px;\">\n    The electric grid is a highly interconnected system that includes generation, transmission, and distribution networks operating in synchronization. This interconnection improves reliability but also means that a security breach in one part of the system can impact the entire grid. :contentReference[oaicite:1]{index=1} ②\n  <\/p>\n\n  <p style=\"font-size: 1.08em; margin-bottom: 14px;\">\n    Power suppliers operate under strict cybersecurity and physical security regulations. A key framework is the NERC Critical Infrastructure Protection (CIP) program, which defines mandatory security requirements for protecting the bulk electric system. :contentReference[oaicite:2]{index=2} ③\n  <\/p>\n\n  <p style=\"font-size: 1.08em; margin-bottom: 14px;\">\n    These standards cover areas such as asset identification, access control, monitoring, incident response, and recovery planning. They ensure that companies systematically manage risks and maintain resilience against cyber threats. :contentReference[oaicite:3]{index=3} ④\n  <\/p>\n\n  <p style=\"font-size: 1.08em; margin-bottom: 14px;\">\n    Cybersecurity in the energy sector is not handled by individual companies alone but relies heavily on collaboration. Public-private partnerships enable continuous communication between industry and government agencies responsible for national security. :contentReference[oaicite:4]{index=4} ⑤\n  <\/p>\n\n  <p style=\"font-size: 1.08em; margin-bottom: 14px;\">\n    Organizations such as the Electricity Subsector Coordinating Council (ESCC), CISA, and the FBI InfraGard program facilitate information exchange, threat intelligence sharing, and coordinated response efforts. :contentReference[oaicite:5]{index=5} ⑥\n  <\/p>\n\n  <p style=\"font-size: 1.08em; margin-bottom: 14px;\">\n    Information sharing is a critical defense mechanism in the sector. Platforms like the Electricity Information Sharing and Analysis Center (E-ISAC) collect, analyze, and distribute threat data to help organizations prepare for and respond to incidents. :contentReference[oaicite:6]{index=6} ⑦\n  <\/p>\n\n  <p style=\"font-size: 1.08em; margin-bottom: 14px;\">\n    Regular training and simulation exercises, such as GridEx, allow organizations to test their response to cyberattacks and improve coordination. These exercises simulate large-scale incidents and help identify weaknesses in current security strategies. :contentReference[oaicite:7]{index=7} ⑧\n  <\/p>\n\n  <p style=\"font-size: 1.08em; margin-bottom: 14px;\">\n    In addition to internal measures, companies rely on third-party assessments to evaluate vulnerabilities and improve their security posture. Continuous evaluation is necessary because cyber threats evolve rapidly over time. :contentReference[oaicite:8]{index=8} ⑨\n  <\/p>\n\n  <p style=\"font-size: 1.08em; margin-bottom: 14px;\">\n    A major challenge is balancing cybersecurity with cost and operational efficiency. Power suppliers must ensure high reliability while managing the financial burden of implementing advanced security measures. :contentReference[oaicite:9]{index=9} ⑩\n  <\/p>\n\n  <p style=\"font-size: 1.08em; margin-bottom: 14px;\">\n    Another challenge is the timely sharing of threat information. Delays in communication about cyber incidents can reduce the ability of organizations to respond effectively and protect their systems. :contentReference[oaicite:10]{index=10} ⑪\n  <\/p>\n\n  <p style=\"font-size: 1.08em; margin-bottom: 40px;\">\n    Overall, cybersecurity in the power sector requires a comprehensive and collaborative approach. It combines regulation, technology, training, and information sharing to ensure the resilience and stability of the electric grid. :contentReference[oaicite:11]{index=11} ⑫\n  <\/p>\n\n  <!-- Reference -->\n  <div style=\"font-size: 0.75em; color: #94a3b8;\">\n    Source: Electric Power Supply Association (EPSA), “Cybersecurity in the Electric Power Supply Sector.”\n  <\/div>\n\n<\/div>",
      "bullets": [],
      "useDropcap": true
    },
    {
      "id": "s_uz06fufq",
      "type": "content",
      "title": "An IDS",
      "text": "\n\n  <h2 style=\"margin-top: 0; margin-bottom: 18px; font-size: 2em; color: #f8fafc;\">\n    Intrusion Detection Systems (IDS)\n  <\/h2>\n\n  <p style=\"font-size: 1.08em; margin-bottom: 14px;\">\n    An intrusion detection system (IDS) is a cybersecurity tool that monitors network traffic and system activity. Its purpose is to detect malicious actions, suspicious behavior, or violations of security policies. :contentReference[oaicite:1]{index=1} ①\n  <\/p>\n\n  <p style=\"font-size: 1.08em; margin-bottom: 14px;\">\n    Instead of blocking attacks directly, an IDS primarily generates alerts for security teams. These alerts help identify threats early and support faster incident response. :contentReference[oaicite:2]{index=2} ②\n  <\/p>\n\n  <p style=\"font-size: 1.08em; margin-bottom: 14px;\">\n    IDS systems can be implemented as software, hardware devices, or cloud-based services. They continuously analyze network traffic or system behavior in real time. :contentReference[oaicite:3]{index=3} ③\n  <\/p>\n\n  <p style=\"font-size: 1.08em; margin-bottom: 14px;\">\n    There are two main detection approaches used by IDS systems. Signature-based detection identifies known attack patterns, while anomaly-based detection identifies unusual behavior that deviates from normal system activity. :contentReference[oaicite:4]{index=4} ④\n  <\/p>\n\n  <p style=\"font-size: 1.08em; margin-bottom: 14px;\">\n    IDS systems are commonly classified into two main types based on their deployment. Network-based IDS (NIDS) monitor traffic across the entire network, while host-based IDS (HIDS) monitor activity on individual devices. :contentReference[oaicite:5]{index=5} ⑤\n  <\/p>\n\n  <p style=\"font-size: 1.08em; margin-bottom: 14px;\">\n    NIDS are typically placed at strategic points in the network, such as behind firewalls, to analyze incoming and outgoing traffic. HIDS focus on detecting changes within a specific system, such as file modifications or unusual processes. :contentReference[oaicite:6]{index=6} ⑥\n  <\/p>\n\n  <p style=\"font-size: 1.08em; margin-bottom: 14px;\">\n    IDS systems are often integrated with other security tools. For example, they can send alerts to centralized systems such as SIEM platforms for deeper analysis and coordinated response. :contentReference[oaicite:7]{index=7} ⑦\n  <\/p>\n\n  <p style=\"font-size: 1.08em; margin-bottom: 14px;\">\n    IDS alone cannot stop attacks, but they play a crucial role in detecting threats that bypass other defenses. For active protection, IDS is often combined with intrusion prevention systems (IPS), which can automatically block malicious activity. :contentReference[oaicite:8]{index=8} ⑧\n  <\/p>\n\n  <p style=\"font-size: 1.08em; margin-bottom: 40px;\">\n    Overall, IDS systems act as continuous monitoring mechanisms within a cybersecurity architecture. They provide visibility into potential threats and support proactive defense strategies. ⑨\n  <\/p>\n\n  <!-- Reference -->\n  <div style=\"position: absolute; bottom: 10px; left: 20px; right: 20px; font-size: 0.75em; color: #94a3b8;\">\n    Source: IBM, “What is an Intrusion Detection System (IDS)?”, IBM Think.\n  <\/div>\n\n<\/div>",
      "bullets": [],
      "useDropcap": true
    }
  ]
};

function paragraphsFromText(text){ return String(text || "").split(/\n\s*\n/).map(s => s.trim()).filter(Boolean); }
function renderContent(sl){ const rawText = String(sl.text || ""); const containsHtml = /<[^>]+>/.test(rawText); let pHtml = ""; if(containsHtml){ pHtml = rawText; } else { paragraphsFromText(rawText).forEach((p,i)=>{ const cls = i===0 ? (sl.useDropcap ? "lead dropcap" : "lead") : ""; pHtml += "<p class=\""+cls+"\">" + escapeHtml(p) + "</p>"; }); } if(!pHtml){ pHtml = "<p class=\"lead dropcap\">Add slide text in the editor.</p>"; } let ul = ""; if((sl.bullets||[]).length){ ul = "<ul>"; sl.bullets.forEach(b=> ul += "<li>"+escapeHtml(b)+"</li>"); ul += "</ul>"; } return "<div class=\"h1\">"+escapeHtml(sl.title)+"</div><div class=\"book\">"+pHtml+ul+"</div>"; }
function renderQuiz(sl){ const prev = state.quiz[sl.id]; const chosen = prev && typeof prev.selectedIndex === "number" ? prev.selectedIndex : null; const answered = !!prev; let opts = ""; sl.options.forEach((txt,i)=>{ let cls = "qOpt"; if(answered){ if(i===sl.correctIndex) cls += " correct"; else if(i===chosen) cls += " wrong"; } opts += "<button class=\""+cls+"\" data-i=\""+i+"\" type=\"button\">"+escapeHtml(txt)+"</button>"; }); const fb = answered ? "<div class=\"qFeedback\">" + (prev.isCorrect ? "✅ Correct. " : "❌ Not quite. ") + escapeHtml(sl.explanation || "") + "</div>" : ""; return "<div class=\"quizBox\"><div class=\"qTitle\">"+escapeHtml(sl.title)+"</div><p class=\"qPrompt\">"+escapeHtml(sl.question||"")+"</p><div class=\"qOptions\">"+opts+"</div>"+fb+"</div>"; }
function wireQuiz(sl){ document.querySelectorAll(".qOpt").forEach(btn => { btn.onclick = () => { const i = Number(btn.getAttribute("data-i")); state.quiz[sl.id] = { selectedIndex:i, isCorrect:i === sl.correctIndex }; render(); }; }); }
function render(){ $("#courseTitle").textContent = lessonData.courseTitle; $("#courseSub").textContent = lessonData.courseSub; const goals = $("#goals"); goals.innerHTML = ""; (lessonData.learningOutcomes || []).forEach(g => { const li = document.createElement("li"); li.textContent = g; goals.appendChild(li); }); state.idx = Math.max(0, Math.min(state.idx, lessonData.slides.length - 1)); $("#slideCounter").textContent = (state.idx + 1) + " / " + lessonData.slides.length; $("#progressFill").style.width = (((state.idx + 1)/lessonData.slides.length) * 100) + "%"; const sl = lessonData.slides[state.idx]; $("#slide").innerHTML = sl.type === "quiz" ? renderQuiz(sl) : renderContent(sl); $("#statusLine").textContent = sl.type === "quiz" ? "Quick Check" : "Reading slide"; $("#btnPrev").disabled = state.idx === 0; $("#btnNext").disabled = state.idx === lessonData.slides.length - 1; if(sl.type === "quiz") wireQuiz(sl); }
$("#btnPrev").onclick = () => { state.idx = Math.max(0, state.idx - 1); render(); };
$("#btnNext").onclick = () => { state.idx = Math.min(lessonData.slides.length - 1, state.idx + 1); render(); };
document.addEventListener("keydown", (e) => { if(e.key === "ArrowLeft"){ state.idx = Math.max(0, state.idx - 1); render(); } else if(e.key === "ArrowRight"){ state.idx = Math.min(lessonData.slides.length - 1, state.idx + 1); render(); } });
render();
</script>
</body>
</html>
